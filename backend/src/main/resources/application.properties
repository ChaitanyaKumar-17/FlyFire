spring.application.name=firesafetypro-backend
server.port=8080

# Supabase PostgreSQL Configuration
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=postgres
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=none

# Security/JWT (Supabase JWT secret and JWKS)
supabase.jwt.secret=${SUPABASE_JWT_SECRET}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SUPABASE_URL}/auth/v1
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_URL}/rest/v1/rpc/jwks

# Supabase API keys for backend operations
supabase.url=${SUPABASE_URL}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
